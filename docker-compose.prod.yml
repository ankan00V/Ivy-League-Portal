version: "3.8"

services:
  mongo:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-vidyaverse}
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: always
    environment:
      CLICKHOUSE_DB: ${ANALYTICS_WAREHOUSE_CLICKHOUSE_DATABASE:-vidyaverse}
      CLICKHOUSE_USER: ${ANALYTICS_WAREHOUSE_CLICKHOUSE_USERNAME:-vidyaverse}
      CLICKHOUSE_PASSWORD: ${ANALYTICS_WAREHOUSE_CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MLOPS_MODEL_ARTIFACT_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${MLOPS_MODEL_ARTIFACT_S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: vidyaverse-backend:latest
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongo:27017}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-vidyaverse}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ANALYTICS_WAREHOUSE_EXPORT_ENABLED=${ANALYTICS_WAREHOUSE_EXPORT_ENABLED:-true}
      - ANALYTICS_WAREHOUSE_EXPORT_FORMAT=${ANALYTICS_WAREHOUSE_EXPORT_FORMAT:-duckdb_parquet}
      - ANALYTICS_WAREHOUSE_CLICKHOUSE_ENABLED=${ANALYTICS_WAREHOUSE_CLICKHOUSE_ENABLED:-true}
      - ANALYTICS_WAREHOUSE_CLICKHOUSE_HOST=${ANALYTICS_WAREHOUSE_CLICKHOUSE_HOST:-clickhouse}
      - ANALYTICS_WAREHOUSE_CLICKHOUSE_PORT=${ANALYTICS_WAREHOUSE_CLICKHOUSE_PORT:-8123}
      - ANALYTICS_WAREHOUSE_CLICKHOUSE_DATABASE=${ANALYTICS_WAREHOUSE_CLICKHOUSE_DATABASE:-vidyaverse}
      - ANALYTICS_WAREHOUSE_CLICKHOUSE_USERNAME=${ANALYTICS_WAREHOUSE_CLICKHOUSE_USERNAME:-vidyaverse}
      - ANALYTICS_WAREHOUSE_CLICKHOUSE_PASSWORD=${ANALYTICS_WAREHOUSE_CLICKHOUSE_PASSWORD}
      - MLOPS_MODEL_ARTIFACT_S3_ENDPOINT_URL=${MLOPS_MODEL_ARTIFACT_S3_ENDPOINT_URL:-http://minio:9000}
      - MLOPS_MODEL_ARTIFACT_S3_REGION=${MLOPS_MODEL_ARTIFACT_S3_REGION:-us-east-1}
      - MLOPS_MODEL_ARTIFACT_S3_ACCESS_KEY_ID=${MLOPS_MODEL_ARTIFACT_S3_ACCESS_KEY_ID}
      - MLOPS_MODEL_ARTIFACT_S3_SECRET_ACCESS_KEY=${MLOPS_MODEL_ARTIFACT_S3_SECRET_ACCESS_KEY}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-["https://web.test"]}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-["api.test"]}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-}
      - FRONTEND_OAUTH_SUCCESS_URL=${FRONTEND_OAUTH_SUCCESS_URL:-https://web.test/auth/callback}
      - FRONTEND_OAUTH_FAILURE_URL=${FRONTEND_OAUTH_FAILURE_URL:-https://web.test/login}
    depends_on:
      - mongo
      - redis
      - clickhouse
      - minio
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: vidyaverse-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-https://api.test}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:8000}
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
  redis_data:
  clickhouse_data:
  minio_data:
