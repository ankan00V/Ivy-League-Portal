services:
  backend:
    environment:
      ENVIRONMENT: production
      AUTH_COOKIE_ONLY_MODE: "true"
      AUTH_SESSION_COOKIE_SECURE: "true"
      METRICS_REQUIRE_AUTH: ${METRICS_REQUIRE_AUTH:-false}
      ANALYTICS_WAREHOUSE_ENFORCE_CLICKHOUSE_IN_PRODUCTION: "true"
      ANALYTICS_WAREHOUSE_ENFORCE_FRESHNESS_IN_PRODUCTION: "true"
      LEARNED_RANKER_REQUIRE_ARTIFACT_IN_PRODUCTION: "true"
      LEARNED_RANKER_REQUIRE_LOADED_IN_PRODUCTION: "true"
      MODEL_REGISTRY_REQUIRE_APPROVED_FOR_ACTIVATION: "true"
      MLOPS_ENFORCE_LIVE_ALERT_CHANNELS_IN_PRODUCTION: "true"
      MLOPS_ENFORCE_OWNER_IN_PRODUCTION: "true"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3g
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  worker:
    environment:
      ENVIRONMENT: production
      ANALYTICS_WAREHOUSE_ENFORCE_CLICKHOUSE_IN_PRODUCTION: "true"
      LEARNED_RANKER_REQUIRE_ARTIFACT_IN_PRODUCTION: "true"
      LEARNED_RANKER_REQUIRE_LOADED_IN_PRODUCTION: "true"
      MODEL_REGISTRY_REQUIRE_APPROVED_FOR_ACTIVATION: "true"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3g
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  frontend:
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      BACKEND_INTERNAL_URL: http://backend:8000
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  mongo:
    restart: always

  redis:
    restart: always

  clickhouse:
    restart: always

  minio:
    restart: always

  prometheus:
    restart: always

  grafana:
    restart: always
