global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/prometheus-rules.yml

scrape_configs:
  - job_name: vidyaverse-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000
          - host.docker.internal:8000

  - job_name: mongodb-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - mongodb-exporter:9216

  - job_name: redis-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - redis-exporter:9121
