groups:
  - name: vidyaverse-core
    rules:
      - alert: VidyaVerseRankingLatencyP95High
        expr: histogram_quantile(0.95, sum by (le) (rate(ranking_request_latency_ms_bucket{traffic_type="real"}[5m]))) > 400
        for: 10m
        labels:
          severity: page
          service: vidyaverse-api
        annotations:
          summary: "Ranking p95 latency is above 400ms"
          description: "ranking_request_latency_ms p95 has exceeded 400ms for 10 minutes."
          runbook: "docs/runbooks/incident-response.md#latency-spike"

      - alert: VidyaVerseFreshnessSLABreached
        expr: max(opportunity_freshness_sla_breached) > 0
        for: 5m
        labels:
          severity: page
          service: vidyaverse-ingestion
        annotations:
          summary: "Opportunity freshness SLA is breached"
          description: "Scraped opportunities are stale beyond configured freshness threshold."
          runbook: "docs/runbooks/incident-response.md#freshness-sla-breach"

      - alert: VidyaVerseMLApplyRateRegression
        expr: |
          (
            sum(rate(opportunity_interaction_events_total{interaction_type="apply",traffic_type="real",experiment_variant="ml"}[30m]))
            /
            clamp_min(sum(rate(opportunity_interaction_events_total{interaction_type="impression",traffic_type="real",experiment_variant="ml"}[30m])), 1)
          )
          <
          (
            sum(rate(opportunity_interaction_events_total{interaction_type="apply",traffic_type="real",experiment_variant="baseline"}[30m]))
            /
            clamp_min(sum(rate(opportunity_interaction_events_total{interaction_type="impression",traffic_type="real",experiment_variant="baseline"}[30m])), 1)
          ) * 0.8
          and
          sum(rate(opportunity_interaction_events_total{interaction_type="impression",traffic_type="real",experiment_variant="ml"}[30m])) > 0.1
          and
          sum(rate(opportunity_interaction_events_total{interaction_type="impression",traffic_type="real",experiment_variant="baseline"}[30m])) > 0.1
        for: 30m
        labels:
          severity: page
          service: vidyaverse-experiments
        annotations:
          summary: "ML variant apply-rate regression vs baseline"
          description: "ML apply-rate is >20% below baseline for 30 minutes on real traffic."
          runbook: "docs/runbooks/incident-response.md#experiment-regression"

      - alert: VidyaVerseSRMSuspected
        expr: |
          abs(
            (
              sum(rate(opportunity_interaction_events_total{interaction_type="impression",traffic_type="real",experiment_variant="baseline"}[30m]))
              /
              clamp_min(sum(rate(opportunity_interaction_events_total{interaction_type="impression",traffic_type="real",experiment_variant=~"baseline|semantic|ml"}[30m])), 1)
            ) - 0.3333
          ) > 0.12
        for: 20m
        labels:
          severity: warn
          service: vidyaverse-experiments
        annotations:
          summary: "Potential SRM in ranking experiment"
          description: "Impression allocation for baseline differs materially from expected 1/3 split."
          runbook: "docs/runbooks/incident-response.md#sample-ratio-mismatch-srm"

      - alert: VidyaVerseAssistantFailureRateHigh
        expr: |
          sum(rate(ranking_requests_total{request_kind="assistant_chat",success="false",traffic_type="real"}[10m]))
          /
          clamp_min(sum(rate(ranking_requests_total{request_kind="assistant_chat",traffic_type="real"}[10m])), 1e-9)
          > 0.05
        for: 15m
        labels:
          severity: warn
          service: vidyaverse-assistant
        annotations:
          summary: "Assistant failure rate is above 5%"
          description: "assistant_chat requests are failing above the target rate for 15 minutes."
          runbook: "docs/runbooks/incident-response.md#assistant-failures"

      - alert: VidyaVerseWarehouseExportFailures
        expr: increase(warehouse_exports_total{status="error"}[30m]) > 0
        for: 10m
        labels:
          severity: page
          service: vidyaverse-warehouse
        annotations:
          summary: "Warehouse export is failing"
          description: "At least one analytics warehouse export failed in the last 30 minutes."
          runbook: "docs/runbooks/incident-response.md#warehouse-export-failures"

      - alert: VidyaVerseEmbeddingProviderDegraded
        expr: min(embedding_provider_health) < 1
        for: 10m
        labels:
          severity: page
          service: vidyaverse-embedding
        annotations:
          summary: "Embedding provider is degraded"
          description: "Embedding service has fallen back to degraded mode."
          runbook: "docs/runbooks/incident-response.md#embedding-provider-degraded"

      - alert: VidyaVerseFeatureStoreFreshnessGateFailed
        expr: max(ds_feature_freshness_seconds) > 10800
        for: 15m
        labels:
          severity: page
          service: vidyaverse-feature-store
        annotations:
          summary: "Feature-store freshness release gate failed"
          description: "Feature-store rows are older than the production freshness gate."
          runbook: "docs/runbooks/data-platform-and-mlops.md#release-gates"

      - alert: VidyaVerseModelInputDriftGateFailed
        expr: max(ds_model_input_drift_value{metric="alert"}) > 0
        for: 5m
        labels:
          severity: page
          service: vidyaverse-mlops
        annotations:
          summary: "Model input drift release gate failed"
          description: "The latest model input drift report is alerting."
          runbook: "docs/runbooks/data-platform-and-mlops.md#release-gates"

      - alert: VidyaVerseParityRegressionGateFailed
        expr: |
          (
            max(ds_parity_scorecard_value{mode="ml",metric="ctr"})
            -
            max(ds_parity_scorecard_value{mode="semantic",metric="ctr"})
          ) < 0
          or
          (
            max(ds_parity_scorecard_value{mode="ml",metric="apply_rate"})
            -
            max(ds_parity_scorecard_value{mode="semantic",metric="apply_rate"})
          ) < 0
        for: 20m
        labels:
          severity: page
          service: vidyaverse-ranking
        annotations:
          summary: "Parity scorecard regressed"
          description: "ML mode is below semantic baseline on CTR or apply-rate."
          runbook: "docs/runbooks/data-platform-and-mlops.md#release-gates"

      - alert: VidyaVerseAssistantQualityGateFailed
        expr: max(ds_assistant_quality_value{metric="failure_rate"}) > 0.05
        for: 15m
        labels:
          severity: page
          service: vidyaverse-assistant
        annotations:
          summary: "Assistant quality release gate failed"
          description: "Assistant failure rate is above the production gate."
          runbook: "docs/runbooks/data-platform-and-mlops.md#release-gates"

      - alert: VidyaVerseRankerSliceApplyRateLow
        expr: ds_ranking_slice_rate{metric="apply_rate",slice_type=~"domain|institution|geography|segment"} < 0.01
        for: 45m
        labels:
          severity: warn
          service: vidyaverse-ranking
        annotations:
          summary: "Per-slice ranker apply rate is low"
          description: "{{ $labels.slice_type }}/{{ $labels.slice_name }} apply-rate is below the per-slice threshold."
          runbook: "docs/runbooks/data-platform-and-mlops.md#per-slice-alerting"
