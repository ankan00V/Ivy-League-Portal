name: Ops Secrets Readiness

on:
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_dispatch:

jobs:
  required-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      OPS_SECRETS_READINESS_REQUIRED: ${{ vars.OPS_SECRETS_READINESS_REQUIRED }}
      STAGING_PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_PLAYWRIGHT_BASE_URL }}
      STAGING_PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.STAGING_PLAYWRIGHT_ADMIN_EMAIL }}
      STAGING_PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.STAGING_PLAYWRIGHT_ADMIN_PASSWORD }}
      STAGING_PLAYWRIGHT_EMPLOYER_EMAIL: ${{ secrets.STAGING_PLAYWRIGHT_EMPLOYER_EMAIL }}
      STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD: ${{ secrets.STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD }}
      MLOPS_ALERT_SLACK_WEBHOOK_URL: ${{ secrets.MLOPS_ALERT_SLACK_WEBHOOK_URL }}
      MLOPS_ALERT_PAGERDUTY_ROUTING_KEY: ${{ secrets.MLOPS_ALERT_PAGERDUTY_ROUTING_KEY }}
      MLOPS_INCIDENT_DEFAULT_OWNER: ${{ vars.MLOPS_INCIDENT_DEFAULT_OWNER }}
      MLOPS_ONCALL_PRIMARY: ${{ vars.MLOPS_ONCALL_PRIMARY }}
      MLOPS_ONCALL_SECONDARY: ${{ vars.MLOPS_ONCALL_SECONDARY }}
    steps:
      - name: Validate required operational wiring
        run: |
          missing=0

          check_secret() {
            key="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "[missing] ${key}"
              missing=1
            else
              echo "[ok] ${key}"
            fi
          }

          check_secret "STAGING_PLAYWRIGHT_BASE_URL" "${STAGING_PLAYWRIGHT_BASE_URL}"
          check_secret "STAGING_PLAYWRIGHT_ADMIN_EMAIL" "${STAGING_PLAYWRIGHT_ADMIN_EMAIL}"
          check_secret "STAGING_PLAYWRIGHT_ADMIN_PASSWORD" "${STAGING_PLAYWRIGHT_ADMIN_PASSWORD}"
          check_secret "STAGING_PLAYWRIGHT_EMPLOYER_EMAIL" "${STAGING_PLAYWRIGHT_EMPLOYER_EMAIL}"
          check_secret "STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD" "${STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD}"
          check_secret "MLOPS_ALERT_SLACK_WEBHOOK_URL" "${MLOPS_ALERT_SLACK_WEBHOOK_URL}"
          check_secret "MLOPS_ALERT_PAGERDUTY_ROUTING_KEY" "${MLOPS_ALERT_PAGERDUTY_ROUTING_KEY}"
          check_secret "MLOPS_INCIDENT_DEFAULT_OWNER (Repository Variable)" "${MLOPS_INCIDENT_DEFAULT_OWNER}"
          check_secret "MLOPS_ONCALL_PRIMARY (Repository Variable)" "${MLOPS_ONCALL_PRIMARY}"
          check_secret "MLOPS_ONCALL_SECONDARY (Repository Variable)" "${MLOPS_ONCALL_SECONDARY}"

          if [ "${missing}" -ne 0 ]; then
            if [ "${OPS_SECRETS_READINESS_REQUIRED}" = "true" ]; then
              echo "Operational readiness checks failed. Missing required secrets/vars."
              exit 1
            fi
            echo "Operational readiness wiring is incomplete, but OPS_SECRETS_READINESS_REQUIRED is not enabled. Reporting only."
            exit 0
          fi

          echo "Operational readiness checks passed."
