name: Warehouse Mart Refresh

on:
  schedule:
    - cron: "10 */6 * * *"
  workflow_dispatch:

jobs:
  rebuild-and-gate-marts:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        env:
          CLICKHOUSE_DB: vidyaverse
          CLICKHOUSE_USER: warehouse_ci
          CLICKHOUSE_PASSWORD: warehouse_ci_password
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MONGODB_URL: mongodb://localhost:27017
      MONGODB_DB_NAME: ivy_league_warehouse_ci
      ANALYTICS_WAREHOUSE_CLICKHOUSE_ENABLED: "true"
      ANALYTICS_WAREHOUSE_CLICKHOUSE_HOST: localhost
      ANALYTICS_WAREHOUSE_CLICKHOUSE_PORT: "8123"
      ANALYTICS_WAREHOUSE_CLICKHOUSE_DATABASE: vidyaverse
      ANALYTICS_WAREHOUSE_CLICKHOUSE_USERNAME: warehouse_ci
      ANALYTICS_WAREHOUSE_CLICKHOUSE_PASSWORD: warehouse_ci_password
      ANALYTICS_WAREHOUSE_CLICKHOUSE_SECURE: "false"
      ANALYTICS_WAREHOUSE_ENFORCE_FRESHNESS_IN_PRODUCTION: "true"
      ONLINE_FEATURES_PUBLISH_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Seed deterministic warehouse fixture
        run: python backend/scripts/seed_release_ml_gate_fixture.py --days 30 --reset

      - name: Rebuild analytics warehouse marts
        run: python backend/scripts/rebuild_analytics_warehouse.py --lookback-days 30 --traffic-type real

      - name: Enforce mart freshness gate
        run: python backend/scripts/check_warehouse_release_gate.py --json

      - name: Run DS release gates
        run: python backend/scripts/check_ds_release_gates.py --lookback-days 30 --fail-on-not-ready

      - name: Upload warehouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-mart-refresh
          path: |
            backend/benchmarks/ds_release_gates.json
            backend/storage/warehouse/marts
          if-no-files-found: ignore
