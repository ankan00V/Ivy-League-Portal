name: Staging Integrated E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * 1-5"

jobs:
  staging-e2e:
    name: Run Staging Integrated Playwright Suite
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Enforce staging URL secret on scheduled runs
        if: ${{ github.event_name == 'schedule' && secrets.STAGING_PLAYWRIGHT_BASE_URL == '' }}
        run: |
          echo "STAGING_PLAYWRIGHT_BASE_URL is required for scheduled staging coverage."
          exit 1

      - name: Run integrated staging tests
        if: ${{ secrets.STAGING_PLAYWRIGHT_BASE_URL != '' }}
        env:
          PLAYWRIGHT_STAGING_URL: ${{ secrets.STAGING_PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_INTEGRATED_AUTH: "1"
          PLAYWRIGHT_LIVE_BACKEND: "1"
          PLAYWRIGHT_STAGING_ADMIN_BEARER: ${{ secrets.STAGING_PLAYWRIGHT_ADMIN_BEARER }}
          PLAYWRIGHT_STAGING_EMPLOYER_EMAIL: ${{ secrets.STAGING_PLAYWRIGHT_EMPLOYER_EMAIL }}
          PLAYWRIGHT_STAGING_EMPLOYER_PASSWORD: ${{ secrets.STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD }}
          CI: "true"
        run: npm run e2e:staging -- --reporter=list

      - name: Skip notice when staging URL is missing
        if: ${{ secrets.STAGING_PLAYWRIGHT_BASE_URL == '' }}
        run: echo "STAGING_PLAYWRIGHT_BASE_URL is not configured; skipping integrated staging suite."
