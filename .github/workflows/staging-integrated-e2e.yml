name: Staging Integrated E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * 1-5"

jobs:
  staging-e2e:
    name: Run Staging Integrated Playwright Suite
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      STAGING_PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_PLAYWRIGHT_BASE_URL }}
      STAGING_PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.STAGING_PLAYWRIGHT_ADMIN_EMAIL }}
      STAGING_PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.STAGING_PLAYWRIGHT_ADMIN_PASSWORD }}
      STAGING_PLAYWRIGHT_EMPLOYER_EMAIL: ${{ secrets.STAGING_PLAYWRIGHT_EMPLOYER_EMAIL }}
      STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD: ${{ secrets.STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD }}
      STAGING_E2E_REQUIRED: ${{ vars.STAGING_E2E_REQUIRED }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate staging identity secrets
        run: |
          missing=0
          check_required() {
            key="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "[missing] ${key}"
              missing=1
            else
              echo "[ok] ${key}"
            fi
          }

          check_required "STAGING_PLAYWRIGHT_BASE_URL" "${STAGING_PLAYWRIGHT_BASE_URL}"
          check_required "STAGING_PLAYWRIGHT_ADMIN_EMAIL" "${STAGING_PLAYWRIGHT_ADMIN_EMAIL}"
          check_required "STAGING_PLAYWRIGHT_ADMIN_PASSWORD" "${STAGING_PLAYWRIGHT_ADMIN_PASSWORD}"
          check_required "STAGING_PLAYWRIGHT_EMPLOYER_EMAIL" "${STAGING_PLAYWRIGHT_EMPLOYER_EMAIL}"
          check_required "STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD" "${STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD}"

          if [ "${missing}" -ne 0 ]; then
            echo "Staging test identities are incomplete."
            if [ "${STAGING_E2E_REQUIRED}" = "true" ]; then
              echo "STAGING_E2E_REQUIRED=true, failing the scheduled staging gate."
              exit 1
            fi
            echo "STAGING_E2E_REQUIRED is not true; treating this as an informational readiness report."
          else
            echo "STAGING_E2E_READY=true" >> "$GITHUB_ENV"
          fi

      - name: Run integrated staging tests
        if: env.STAGING_E2E_READY == 'true'
        env:
          PLAYWRIGHT_STAGING_URL: ${{ env.STAGING_PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_BASE_URL: ${{ env.STAGING_PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_INTEGRATED_AUTH: "1"
          PLAYWRIGHT_LIVE_BACKEND: "1"
          PLAYWRIGHT_STAGING_ADMIN_EMAIL: ${{ env.STAGING_PLAYWRIGHT_ADMIN_EMAIL }}
          PLAYWRIGHT_STAGING_ADMIN_PASSWORD: ${{ env.STAGING_PLAYWRIGHT_ADMIN_PASSWORD }}
          PLAYWRIGHT_STAGING_EMPLOYER_EMAIL: ${{ env.STAGING_PLAYWRIGHT_EMPLOYER_EMAIL }}
          PLAYWRIGHT_STAGING_EMPLOYER_PASSWORD: ${{ env.STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD }}
          CI: "true"
        run: npm run e2e:staging -- --reporter=list
