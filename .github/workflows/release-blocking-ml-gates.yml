name: Release Blocking ML Gates

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  parity-and-champion-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MONGODB_URL: ${{ secrets.MONGODB_URL }}
      MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate required DB secrets
        run: |
          if [ -z "${MONGODB_URL}" ] || [ -z "${MONGODB_DB_NAME}" ]; then
            echo "Missing MONGODB_URL or MONGODB_DB_NAME secrets."
            exit 1
          fi

      - name: Run real-traffic parity gate
        run: python backend/scripts/check_real_traffic_rollout_readiness.py --days 14 --fail-on-not-ready

      - name: Run champion/challenger gate
        run: python backend/scripts/check_champion_challenger_gate.py --days 14 --fail-on-not-ready

      - name: Run DS operating-loop gate
        run: python backend/scripts/check_ds_release_gates.py --lookback-days 14 --fail-on-not-ready

      - name: Run assistant quality gate
        run: python backend/benchmarks/run_assistant_quality_eval.py --fail-on-regression

      - name: Upload release ML gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-blocking-ml-gates
          path: |
            backend/benchmarks/real_traffic_rollout_readiness.json
            docs/portfolio/real_traffic_rollout_readiness.md
            backend/benchmarks/champion_challenger_gate.json
            docs/portfolio/champion_challenger_gate.md
            backend/benchmarks/ds_release_gates.json
            backend/benchmarks/assistant_quality_eval.json
          if-no-files-found: ignore
