name: Frontend UX Quality Gate

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ux-quality-gate.yml"
  workflow_dispatch:

jobs:
  ux-quality:
    name: Accessibility + Visual UX Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run UX quality suite
        env:
          CI: "true"
        run: npm run e2e:ux -- --reporter=list
