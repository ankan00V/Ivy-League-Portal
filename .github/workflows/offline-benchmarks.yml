name: Offline ML Benchmarks

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  offline-benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BENCH_MAX_DROP_PRECISION_AT_K: "0.010"
      BENCH_MAX_DROP_RECALL_AT_K: "0.010"
      BENCH_MAX_DROP_NDCG_AT_K: "0.010"
      BENCH_MAX_DROP_MRR_AT_K: "0.010"
      BENCH_LATENCY_P95_MS_BUDGET: "25"
      BENCH_LATENCY_MEAN_MS_BUDGET: "12"
      BENCH_LATENCY_MAX_MS_BUDGET: "40"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/benchmarks/requirements.txt

      - name: Install benchmark dependencies
        run: pip install -r backend/benchmarks/requirements.txt

      - name: Run offline retrieval regression gate
        run: >
          python backend/benchmarks/run_offline_benchmarks.py
          --profile ci_hash
          --gate
          --k 5
          --tolerance 0
          --out /tmp/offline-benchmark-results.json
          --fail-on-fallback
          --semantic-max-precision-drop $BENCH_MAX_DROP_PRECISION_AT_K
          --semantic-max-recall-drop $BENCH_MAX_DROP_RECALL_AT_K
          --semantic-max-ndcg-drop $BENCH_MAX_DROP_NDCG_AT_K
          --semantic-max-mrr-drop $BENCH_MAX_DROP_MRR_AT_K
          --semantic-p95-ms-budget $BENCH_LATENCY_P95_MS_BUDGET
          --semantic-mean-ms-budget $BENCH_LATENCY_MEAN_MS_BUDGET
          --semantic-max-ms-budget $BENCH_LATENCY_MAX_MS_BUDGET
