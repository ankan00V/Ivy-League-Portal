name: Dataset Snapshot Refresh

on:
  schedule:
    - cron: "5 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-dataset-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MONGODB_URL: ${{ secrets.MONGODB_URL }}
      MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate required secrets
        run: |
          if [ -z "${MONGODB_URL}" ] || [ -z "${MONGODB_DB_NAME}" ]; then
            echo "Missing MONGODB_URL or MONGODB_DB_NAME secrets. Skipping dataset snapshot refresh."
            exit 0
          fi

      - name: Refresh dataset snapshot and README block
        run: python backend/scripts/publish_dataset_snapshot.py

      - name: Commit refreshed dataset snapshot
        run: |
          if git diff --quiet -- README.md backend/benchmarks/dataset_snapshot_latest.json; then
            echo "No dataset snapshot changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md backend/benchmarks/dataset_snapshot_latest.json
          git commit -m "chore: refresh dataset snapshot"
          git push

      - name: Upload dataset snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dataset-snapshot
          path: backend/benchmarks/dataset_snapshot_latest.json
          if-no-files-found: ignore

