name: Production Readiness Gate

on:
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-and-policy:
    name: Security and Policy Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Scan for hardcoded secrets
        run: python backend/scripts/check_secret_patterns.py

      - name: Check duplicate artifact files
        run: python backend/scripts/check_duplicate_artifacts.py

      - name: Validate release contracts
        run: python backend/scripts/check_release_contracts.py

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auth-critical-regressions:
    name: Auth and Onboarding Regressions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: security-and-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run auth and onboarding tests
        run: |
          python -m unittest backend.tests.test_auth_oauth -v
          python -m unittest backend.tests.test_auth_cookie_session -v
          python -m unittest backend.tests.test_http_security_middleware -v
          python -m unittest backend.tests.test_session_security_service -v
          python -m unittest backend.tests.test_users_ranking_summary -v

  recommendation-regressions:
    name: Recommendation and Analytics Regressions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: security-and-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run recommendation and analytics tests
        run: |
          python -m unittest backend.tests.test_activation_policy -v
          python -m unittest backend.tests.test_recommendation_service -v
          python -m unittest backend.tests.test_experiment_analytics_service -v
          python -m unittest backend.tests.test_cold_start_service -v
          python -m unittest backend.tests.test_ranker_feature_builder -v

  ingestion-quality-regressions:
    name: Ingestion and Data Quality Regressions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: security-and-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run ingestion, parser, and dedup tests
        run: |
          python -m unittest backend.tests.test_parser_contract -v
          python -m unittest backend.tests.test_opportunity_quality_service -v
          python -m unittest backend.tests.test_duplicate_detector -v
          python -m unittest backend.tests.test_scraper_health_service -v
          python -m unittest backend.tests.test_job_runner_scaling -v
          python -m unittest backend.tests.test_bootstrap_demo_data -v
          python -m unittest backend.tests.test_cache_manager -v
          python -m unittest backend.tests.test_data_bootstrap_scripts -v
          python -m unittest backend.tests.test_source_discovery_pipeline -v

  frontend-production-readiness:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - auth-critical-regressions
      - recommendation-regressions
      - ingestion-quality-regressions
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Verify system Chrome
        run: google-chrome --version

      - name: Validate browser security headers
        env:
          PLAYWRIGHT_USE_SYSTEM_CHROME: "1"
        run: npm run e2e -- --project=chromium --grep "Browser security headers|Profile editing and university selection persist"

  staging-multi-role-release-block:
    name: Staging Multi-Role E2E (Release Blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name != 'pull_request' }}
    needs: frontend-production-readiness
    env:
      STAGING_PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_PLAYWRIGHT_BASE_URL }}
      STAGING_PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.STAGING_PLAYWRIGHT_ADMIN_EMAIL }}
      STAGING_PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.STAGING_PLAYWRIGHT_ADMIN_PASSWORD }}
      STAGING_PLAYWRIGHT_EMPLOYER_EMAIL: ${{ secrets.STAGING_PLAYWRIGHT_EMPLOYER_EMAIL }}
      STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD: ${{ secrets.STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD }}
      STAGING_E2E_REQUIRED: ${{ vars.STAGING_E2E_REQUIRED }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate required staging secrets
        id: check_secrets
        run: |
          missing=0
          require_secret() {
            key="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "[missing] ${key}"
              missing=1
            else
              echo "[ok] ${key}"
            fi
          }
          require_secret "STAGING_PLAYWRIGHT_BASE_URL" "${STAGING_PLAYWRIGHT_BASE_URL}"
          require_secret "STAGING_PLAYWRIGHT_ADMIN_EMAIL" "${STAGING_PLAYWRIGHT_ADMIN_EMAIL}"
          require_secret "STAGING_PLAYWRIGHT_ADMIN_PASSWORD" "${STAGING_PLAYWRIGHT_ADMIN_PASSWORD}"
          require_secret "STAGING_PLAYWRIGHT_EMPLOYER_EMAIL" "${STAGING_PLAYWRIGHT_EMPLOYER_EMAIL}"
          require_secret "STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD" "${STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD}"
          if [ "${missing}" -ne 0 ]; then
            echo "STAGING_E2E_READY=false" >> "$GITHUB_ENV"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Staging E2E secrets are incomplete. Skipping staging tests."
          else
            echo "STAGING_E2E_READY=true" >> "$GITHUB_ENV"
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "✅ All staging secrets configured. Will run E2E tests."
          fi

      - name: Install Playwright Chromium
        if: steps.check_secrets.outputs.ready == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run staging integrated suites
        if: steps.check_secrets.outputs.ready == 'true'
        env:
          PLAYWRIGHT_STAGING_URL: ${{ env.STAGING_PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_BASE_URL: ${{ env.STAGING_PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_INTEGRATED_AUTH: "1"
          PLAYWRIGHT_LIVE_BACKEND: "1"
          PLAYWRIGHT_STAGING_ADMIN_EMAIL: ${{ env.STAGING_PLAYWRIGHT_ADMIN_EMAIL }}
          PLAYWRIGHT_STAGING_ADMIN_PASSWORD: ${{ env.STAGING_PLAYWRIGHT_ADMIN_PASSWORD }}
          PLAYWRIGHT_STAGING_EMPLOYER_EMAIL: ${{ env.STAGING_PLAYWRIGHT_EMPLOYER_EMAIL }}
          PLAYWRIGHT_STAGING_EMPLOYER_PASSWORD: ${{ env.STAGING_PLAYWRIGHT_EMPLOYER_PASSWORD }}
          CI: "true"
        run: npm run e2e:staging -- --reporter=list

      - name: Enforce staging gate when required
        if: steps.check_secrets.outputs.ready != 'true' && env.STAGING_E2E_REQUIRED == 'true'
        run: |
          echo "❌ Blocking release: STAGING_E2E_REQUIRED=true but staging secrets are incomplete."
          exit 1

      - name: Staging E2E Summary
        if: always()
        run: |
          if [ "${{ steps.check_secrets.outputs.ready }}" == "true" ]; then
            echo "✅ Staging E2E tests completed successfully"
          elif [ "${{ env.STAGING_E2E_REQUIRED }}" == "true" ]; then
            echo "❌ Staging E2E tests required but secrets missing"
          else
            echo "⚠️ Staging E2E tests skipped (secrets not configured, but not required)"
          fi
