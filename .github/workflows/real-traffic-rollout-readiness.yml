name: Real Traffic Rollout Readiness

on:
  schedule:
    - cron: "20 4 * * 1-5"
  workflow_dispatch:

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MONGODB_URL: ${{ secrets.MONGODB_URL }}
      MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate required secrets
        run: |
          if [ -z "${MONGODB_URL}" ] || [ -z "${MONGODB_DB_NAME}" ]; then
            echo "Missing MONGODB_URL or MONGODB_DB_NAME secrets. Skipping readiness run."
            exit 0
          fi

      - name: Generate readiness report
        run: |
          python backend/scripts/check_real_traffic_rollout_readiness.py --days 14 --fail-on-not-ready

      - name: Upload readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-traffic-rollout-readiness
          path: |
            docs/portfolio/real_traffic_rollout_readiness.md
            backend/benchmarks/real_traffic_rollout_readiness.json
          if-no-files-found: ignore
