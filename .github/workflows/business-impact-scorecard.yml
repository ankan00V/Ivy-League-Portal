name: Weekly Business Impact Scorecard

on:
  schedule:
    - cron: "50 4 * * 1"
  workflow_dispatch:

jobs:
  publish-business-impact:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MONGODB_URL: ${{ secrets.MONGODB_URL }}
      MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate required DB secrets
        run: |
          if [ -z "${MONGODB_URL}" ] || [ -z "${MONGODB_DB_NAME}" ]; then
            echo "Missing MONGODB_URL or MONGODB_DB_NAME secrets."
            exit 1
          fi

      - name: Publish weekly business impact scorecard
        run: |
          python backend/scripts/publish_weekly_business_impact_scorecard.py --days 7

      - name: Upload business impact artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-business-impact-scorecard
          path: |
            backend/benchmarks/weekly_business_impact_scorecard.json
            docs/portfolio/weekly_business_impact_scorecard.md
          if-no-files-found: ignore
