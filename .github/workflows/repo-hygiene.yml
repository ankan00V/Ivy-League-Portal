name: Repo Hygiene

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  duplicate-artifact-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for duplicate artifact files
        run: python backend/scripts/check_duplicate_artifacts.py
