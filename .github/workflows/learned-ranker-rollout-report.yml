name: Learned Ranker Rollout Report

on:
  schedule:
    - cron: "35 4 * * *"
  workflow_dispatch:

jobs:
  rollout-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MONGODB_URL: ${{ secrets.MONGODB_URL }}
      MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
      LEARNED_RANKER_ROLLBACK_ON_GUARDRAIL_FAILURE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate required secrets
        run: |
          if [ -z "${MONGODB_URL}" ] || [ -z "${MONGODB_DB_NAME}" ]; then
            echo "Missing MONGODB_URL or MONGODB_DB_NAME secrets. Skipping rollout report."
            exit 0
          fi

      - name: Publish daily champion challenger rollout report
        run: python backend/scripts/publish_ranker_rollout_report.py --days 1 --rollback-on-fail

      - name: Upload rollout artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: learned-ranker-rollout-report
          path: |
            docs/portfolio/learned_ranker_rollout_report.md
            backend/benchmarks/learned_ranker_rollout_report.json
          if-no-files-found: ignore

